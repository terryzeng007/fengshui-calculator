<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八字命运馆</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #000; color: #fff; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .nav { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(0,0,0,0.8); backdrop-filter: blur(30px); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav h1 { font-size: 18px; font-weight: 600; letter-spacing: 2px; }
        .hero { padding: 120px 20px 60px; text-align: center; }
        .hero h2 { font-size: 32px; font-weight: 700; margin-bottom: 12px; background: linear-gradient(135deg, #fff 0%, #007AFF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: rgba(255,255,255,0.6); font-size: 16px; margin-bottom: 40px; }
        .input-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(30px); border-radius: 24px; padding: 32px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .input-row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 13px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        .input-group input, .input-group select { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 14px 18px; color: #fff; font-size: 16px; width: 140px; outline: none; transition: all 0.3s; }
        .input-group input:focus, .input-group select:focus { border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0,122,255,0.2); }
        .gender-toggle { display: flex; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 4px; }
        .gender-btn { padding: 12px 24px; border: none; background: transparent; color: rgba(255,255,255,0.6); border-radius: 10px; cursor: pointer; font-size: 15px; transition: all 0.3s; }
        .gender-btn.active { background: #007AFF; color: #fff; }
        .calc-btn { width: 100%; max-width: 300px; padding: 18px; background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%); border: none; border-radius: 14px; color: #fff; font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin: 0 auto; display: block; }
        .calc-btn:hover { transform: scale(1.02); box-shadow: 0 20px 40px rgba(0,122,255,0.3); }
        .results { display: none; }
        .results.show { display: block; }
        .result-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(30px); border-radius: 24px; padding: 28px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.1); animation: fadeIn 0.5s ease-out both; }
        .result-card:nth-child(1) { animation-delay: 0.1s; }
        .result-card:nth-child(2) { animation-delay: 0.2s; }
        .result-card:nth-child(3) { animation-delay: 0.3s; }
        .result-card:nth-child(4) { animation-delay: 0.4s; }
        .result-card:nth-child(5) { animation-delay: 0.5s; }
        .result-card:nth-child(6) { animation-delay: 0.6s; }
        .result-card:nth-child(7) { animation-delay: 0.7s; }
        .result-card:nth-child(8) { animation-delay: 0.8s; }
        .card-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .card-title::before { content: ''; width: 4px; height: 24px; background: linear-gradient(180deg, #007AFF, #5856D6); border-radius: 2px; }
        .card-content { color: rgba(255,255,255,0.85); line-height: 1.8; }
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; text-align: center; }
        .bazi-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 8px; }
        .bazi-item .label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
        .bazi-item .value { font-size: 22px; font-weight: 600; }
        .bazi-item .wx { font-size: 13px; color: #007AFF; margin-top: 4px; }
        .tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
        .tag { background: rgba(0,122,255,0.2); color: #007AFF; padding: 8px 16px; border-radius: 20px; font-size: 14px; }
        .colors { display: flex; gap: 12px; flex-wrap: wrap; }
        .color-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: rgba(255,255,255,0.05); border-radius: 12px; }
        .color-dot { width: 32px; height: 32px; border-radius: 8px; }
        .numbers { display: flex; gap: 16px; }
        .num-item { width: 56px; height: 56px; background: linear-gradient(135deg, #007AFF, #5856D6); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-item { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .stat-label { font-size: 13px; color: rgba(255,255,255,0.6); }
        .stat-item.good .stat-value { color: #30D158; }
        .stat-item.medium .stat-value { color: #FFD60A; }
        .stat-item.bad .stat-value { color: #FF453A; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .bazi-grid { grid-template-columns: repeat(2, 1fr); } .stats-grid { grid-template-columns: 1fr; } .input-row { flex-direction: column; align-items: center; } }
        footer { text-align: center; padding: 40px; color: rgba(255,255,255,0.4); font-size: 13px; }
    </style>
</head>
<body>
    <div class="nav"><h1>八字命运馆</h1></div>
    <div class="container">
        <div class="hero">
            <h2>探索你的命运密码</h2>
            <p>输入出生信息，解密八字命理</p>
        </div>
        <div class="input-card">
            <div class="input-row">
                <div class="input-group"><label>年份</label><input type="number" id="year" placeholder="1990" min="1900" max="2025"></div>
                <div class="input-group"><label>月份</label><select id="month"></select></div>
                <div class="input-group"><label>日期</label><select id="day"></select></div>
                <div class="input-group"><label>时辰</label><select id="hour"></select></div>
            </div>
            <div class="input-row">
                <div class="gender-toggle">
                    <button class="gender-btn active" data-gender="male">♂ 男</button>
                    <button class="gender-btn" data-gender="female">♀ 女</button>
                </div>
            </div>
            <button class="calc-btn" onclick="calculate()">开始解析</button>
        </div>
        <div class="results" id="results"></div>
    </div>
    <footer>© 2026 八字命运馆 · 仅供娱乐参考</footer>
    <script>
        const tiangan = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
        const dizhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
        const wuxing = ['木','火','土','金','水'];
        const nayin = ['海中金','炉中火','大林木','路旁土','剑锋金','山头火','涧下水','城头土','白蜡金','杨柳木','井泉水','屋上土','霹雳火','松柏木','长流水','砂石金','山下火','平地木','壁上土','金箔金','覆灯火','天河水','大驿土','钗钏金','桑柘木','大溪水','砂中土','天上火','石榴木','大海水'];
        
        const elementData = {
            '木': { colors: ['#2ECC71','#00B894','#00CEC9'], nums: [3,8], career: ['教育','医疗','环保','艺术','宗教'], personality: '仁慈善良、性格温和、富有同情心、善于思考、有艺术气质', fortune: '适合稳定理财，不宜冒险投资', love: '桃花运稳定，对象宜温柔贤惠' },
            '火': { colors: ['#E74C3C','#9B59B6','#E67E22'], nums: [2,7], career: ['餐饮','电子','互联网','能源','娱乐'], personality: '热情开朗、冲动好胜、精力充沛、创造力强、急性子', fortune: '财运波动大，需谨慎理财', love: '桃花运旺盛，但易冲动' },
            '土': { colors: ['#F1C40F','#D35400','#E67E22'], nums: [5,10], career: ['房地产','农业','珠宝','建筑','物流'], personality: '稳重踏实、诚实守信、注重名誉、有责任感、保守', fortune: '财运平稳，擅长储蓄', love: '婚姻稳定，适宜长久发展' },
            '金': { colors: ['#ECF0F1','#F1C40F','#BDC3C7'], nums: [4,9], career: ['金融','法律','机械','汽车','军工'], personality: '刚毅果断、理性冷静、注重效率、有领导力、固执', fortune: '偏财运好，适合投资', love: '桃花运较弱，需主动追求' },
            '水': { colors: ['#2C3E50','#3498DB','#2980B9'], nums: [1,6], career: ['贸易','物流','旅游','咨询','媒体'], personality: '聪明灵活、善于沟通、适应力强、情感丰富、爱思考', fortune: '财源广开，但花销也大', love: '桃花运强，异性缘佳' }
        };
        
        let selectedGender = 'male';
        document.querySelectorAll('.gender-btn').forEach(btn => btn.addEventListener('click',function(){document.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');selectedGender=this.dataset.gender;}));
        
        for(let i=1;i<=12;i++){document.getElementById('month').innerHTML+='<option value="'+i+'">'+i+'月</option>';}
        for(let i=1;i<=31;i++){document.getElementById('day').innerHTML+='<option value="'+i+'">'+i+'日</option>';}
        for(let i=1;i<=12;i++){let h=i==1?'子时(23-1)':i==3?'寅时(3-5)':i==5?'卯时(5-7)':i==7?'辰时(7-9)':i==9?'巳时(9-11)':i==11?'午时(11-13)':i==13?'未时(13-15)':i==15?'申时(15-17)':i==17?'酉时(17-19)':i==19?'戌时(19-21)':i==21?'亥时(21-23)':'丑时(1-3)';document.getElementById('hour').innerHTML+='<option value="'+i+'">'+h+'</option>';}
        
        function getTiangan(year,month,day,hour){return (year*1+month*1+day*1+hour*1+4)%10;}
        function getDizhi(year,month,day,hour){return (year*1+month*1+day*1+hour*1+6)%12;}
        function getElement(idx){return wuxing[Math.floor(idx/2)];}
        
        function calculate(){
            const year=parseInt(document.getElementById('year').value);
            const month=parseInt(document.getElementById('month').value);
            const day=parseInt(document.getElementById('day').value);
            const hour=parseInt(document.getElementById('hour').value);
            if(!year||year<1900||year>2025){alert('请输入有效年份1900-2025');return;}
            
            const tgIdx=getTiangan(year,month,day,hour);
            const dzIdx=getDizhi(year,month,day,hour);
            const element=getElement(tgIdx);
            const nayinStr=nayin[(tgIdx+dzIdx)%30];
            const data=elementData[element];
            
            const yearPillar=tiangan[tgIdx]+dizhi[dzIdx];
            const monthPillar=tiangan[(tgIdx*2+month)%10]+dizhi[(month+1)%12];
            const dayPillar=tiangan[(tgIdx*3+day)%10]+dizhi[(day+1)%12];
            const hourPillar=tiangan[(tgIdx*4+hour)%10]+dizhi[(hour)%12];
            
            let html='<div class="result-card"><div class="card-title">命主信息</div><div class="card-content"><div class="tags"><span class="tag" style="font-size:28px;font-weight:700">'+element+'</span><span class="tag">'+nayinStr+'</span></div><p style="margin-top:16px">日主'+element+'命，五行属'+element+'，命主星为'+tiangan[tgIdx]+'星</p></div></div>';
            
            html+='<div class="result-card"><div class="card-title">八字详情</div><div class="card-content"><div class="bazi-grid"><div class="bazi-item"><div class="label">年柱</div><div class="value">'+yearPillar+'</div><div class="wx">'+getElement(getTiangan(year,month,day,hour))+'</div></div><div class="bazi-item"><div class="label">月柱</div><div class="value">'+monthPillar+'</div><div class="wx">'+getElement(getTiangan(year,month,day,hour)*2%10)+'</div></div><div class="bazi-item"><div class="label">日柱</div><div class="value">'+dayPillar+'</div><div class="wx">'+element+'</div></div><div class="bazi-item"><div class="label">时柱</div><div class="value">'+hourPillar+'</div><div class="wx">'+getElement(getTiangan(year,month,day,hour)*3%10)+'</div></div></div></div></div>';
            
            html+='<div class="result-card"><div class="card-title">性格分析</div><div class="card-content"><p>'+data.personality+'</p></div></div>';
            
            html+='<div class="result-card"><div class="card-title">事业运程</div><div class="card-content"><div class="tags">'+data.career.map(c=>'<span class="tag">'+c+'</span>').join('')+'</div><p style="margin-top:16px">适合行业发展方向，建议选择与木、火、土、金、水相关行业</p></div></div>';
            
            html+='<div class="result-card"><div class="card-title">财富运势</div><div class="card-content"><div class="stats-grid"><div class="stat-item good"><div class="stat-value">中上</div><div class="stat-label">整体财运</div></div><div class="stat-item good"><div class="stat-value">稳定</div><div class="stat-label">理财风格</div></div><div class="stat-item medium"><div class="stat-value">适中</div><div class="stat-label">消费水平</div></div></div><p>'+data.fortune+'</p></div></div>';
            
            html+='<div class="result-card"><div class="card-title">感情分析</div><div class="card-content"><p>'+data.love+'</p></div></div>';
            
            html+='<div class="result-card"><div class="card-title">幸运指引</div><div class="card-content"><div style="margin-bottom:20px"><p style="margin-bottom:12px;color:rgba(255,255,255,0.6)">幸运颜色</p><div class="colors">'+data.colors.map(c=>'<div class="color-item"><div class="color-dot" style="background:'+c+'"></div><span>'+c+'</span></div>').join('')+'</div></div><div><p style="margin-bottom:12px;color:rgba(255,255,255,0.6)">幸运数字</p><div class="numbers">'+data.nums.map(n=>'<div class="num-item">'+n+'</div>').join('')+'</div></div></div></div>';
            
            const todayLuck=['大吉','吉','平','需要注意'][Math.floor(Math.random()*4)];
            html+='<div class="result-card"><div class="card-title">今日运势</div><div class="card-content"><div class="stats-grid"><div class="stat-item good"><div class="stat-value">'+todayLuck+'</div><div class="stat-label">综合运势</div></div><div class="stat-item good"><div class="stat-value">√</div><div class="stat-label">宜</div></div><div class="stat-item bad"><div class="stat-value">×</div><div class="stat-label">忌</div></div></div><p>今日宜静心养性，忌冲动行事。多与朋友交流，有助于提升运势。</p></div></div>';
            
            document.getElementById('results').innerHTML=html;
            document.getElementById('results').classList.add('show');
        }
        document.getElementById('year').addEventListener('keypress',e=>{if(e.key==='Enter')calculate();});
    </script>
</body>
</html>
